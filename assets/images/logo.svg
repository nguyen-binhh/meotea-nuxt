<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 122" fill="none" role="img" aria-label="Mèo Trà logo">
  <!-- Cat ears (bases computed to land on circle boundary) -->
  <path d="M33,28 L24,10 L39,24"
        stroke="#F48FB1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M61,24 L76,10 L67,28"
        stroke="#F48FB1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cat head -->
  <circle cx="50" cy="40" r="19" stroke="#F48FB1" stroke-width="2.5"/>

  <!-- Eyes (filled dots) -->
  <circle cx="43" cy="37" r="2.5" fill="#F48FB1"/>
  <circle cx="57" cy="37" r="2.5" fill="#F48FB1"/>

  <!-- Smile -->
  <path d="M43,46 Q50,53 57,46" stroke="#F48FB1" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Straw -->
  <line x1="50" y1="59" x2="50" y2="68" stroke="#F48FB1" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Dome lid -->
  <path d="M30,68 Q50,60 70,68" stroke="#F48FB1" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Cup body (narrows toward bottom → realistic boba cup shape) -->
  <path d="M30,68 L34,108 Q34,112 50,112 Q66,112 66,108 L70,68"
        stroke="#F48FB1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Fill line -->
  <line x1="33" y1="81" x2="67" y2="81" stroke="#F48FB1" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Boba pearls -->
  <circle cx="42" cy="103" r="4" fill="#FCE4EC" stroke="#F48FB1" stroke-width="1.5"/>
  <circle cx="50" cy="106" r="4" fill="#FCE4EC" stroke="#F48FB1" stroke-width="1.5"/>
  <circle cx="58" cy="103" r="4" fill="#FCE4EC" stroke="#F48FB1" stroke-width="1.5"/>
</svg>
